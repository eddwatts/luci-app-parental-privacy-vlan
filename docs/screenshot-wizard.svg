<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style>text { font-family: 'Segoe UI', Arial, sans-serif; } .mono { font-family: 'Consolas','Courier New',monospace; }</style>
  </defs>
  <rect width="900" height="360" fill="#f8fafc" rx="8"/>

  <!-- LuCI top bar -->
  <rect width="900" height="40" fill="#1a6fa3" rx="0"/>
  <text x="18" y="26" fill="white" font-size="14" font-weight="600">OpenWrt</text>
  <text x="80" y="26" fill="rgba(255,255,255,0.5)" font-size="14">/</text>
  <text x="92" y="26" fill="rgba(255,255,255,0.8)" font-size="14">Network</text>
  <text x="154" y="26" fill="rgba(255,255,255,0.5)" font-size="14">/</text>
  <text x="166" y="26" fill="white" font-size="14">Parental Privacy Wizard</text>

  <!-- Wizard title -->
  <text x="90" y="76" fill="#1e293b" font-size="20" font-weight="600">Parental Privacy Wizard</text>

  <!-- Step tabs -->
  <rect x="90" y="88" width="720" height="2" fill="#e2e8f0"/>
  <!-- Tab 1 active -->
  <rect x="90" y="88" width="180" height="2" fill="#0086c9"/>
  <text x="180" y="108" fill="#0086c9" font-size="13" font-weight="600" text-anchor="middle">1. Primary DNS</text>
  <!-- Tab 2 -->
  <text x="360" y="108" fill="#888" font-size="13" text-anchor="middle">2. Kids WiFi</text>
  <!-- Tab 3 -->
  <text x="540" y="108" fill="#888" font-size="13" text-anchor="middle">3. Hardware Button</text>

  <!-- Step 1 content -->
  <text x="90" y="140" fill="#1e293b" font-size="16" font-weight="600">Secure Your Main Network</text>

  <!-- Info box -->
  <rect x="90" y="150" width="720" height="46" fill="#eff6ff" rx="4"/>
  <rect x="90" y="150" width="3" height="46" fill="#0086c9" rx="1"/>
  <text x="102" y="168" fill="#334155" font-size="12">Every time a device visits a website it asks a DNS server for directions. Choosing a</text>
  <text x="102" y="184" fill="#334155" font-size="12">protective DNS like Quad9 blocks known malware and scam sites before they load.</text>

  <!-- DNS option cards -->
  <!-- ISP Default -->
  <rect x="90" y="208" width="690" height="42" fill="white" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="108" y="228" fill="#1e293b" font-size="13" font-weight="600">ISP Default</text>
  <text x="108" y="243" fill="#666" font-size="11">Uses your internet provider's DNS. May satisfy data retention mandates.</text>

  <!-- Quad9 -->
  <rect x="90" y="258" width="690" height="42" fill="white" rx="6" stroke="#0086c9" stroke-width="2"/>
  <circle cx="766" cy="279" r="8" fill="#0086c9"/>
  <text x="108" y="278" fill="#1e293b" font-size="13" font-weight="600">Quad9 — Malware Shield   9.9.9.9</text>
  <text x="108" y="293" fill="#666" font-size="11">Blocks known malware and phishing. No logging. Non-profit, Switzerland-based.</text>

  <!-- Cloudflare -->
  <rect x="90" y="308" width="690" height="42" fill="white" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="108" y="328" fill="#1e293b" font-size="13" font-weight="600">Cloudflare — Privacy and Malware Protection   1.1.1.2</text>
  <text x="108" y="343" fill="#666" font-size="11">Fastest public DNS resolver. Privacy-focused, protection from Malware.</text>
</svg>
