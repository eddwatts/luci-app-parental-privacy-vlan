<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .mono { font-family: 'Consolas', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0a0e1a" rx="8"/>

  <!-- LuCI breadcrumb bar -->
  <rect width="900" height="36" fill="#111827" rx="0"/>
  <rect width="900" height="36" fill="#111827"/>
  <rect x="0" y="35" width="900" height="1" fill="#1f2d45"/>
  <text x="18" y="23" fill="#4f9cf9" font-size="13" font-weight="600" class="mono">OpenWrt</text>
  <text x="82" y="23" fill="#2a3f5f" font-size="13" class="mono">/</text>
  <text x="92" y="23" fill="#64748b" font-size="13" class="mono">Network</text>
  <text x="155" y="23" fill="#2a3f5f" font-size="13" class="mono">/</text>
  <text x="165" y="23" fill="#e2e8f0" font-size="13" class="mono">Kids Network</text>
  <!-- unsaved badge -->
  <rect x="760" y="10" width="122" height="18" fill="rgba(251,191,36,0.1)" rx="4" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="772" cy="19" r="3" fill="#fbbf24"/>
  <text x="780" y="23" fill="#fbbf24" font-size="10" class="mono">unsaved changes</text>

  <!-- Page header -->
  <text x="20" y="72" fill="#e2e8f0" font-size="20" font-weight="600">🧒 Kids Network</text>
  <text x="20" y="90" fill="#94a3b8" font-size="12">All settings for your isolated children's WiFi — managed in one place.</text>

  <!-- Master toggle -->
  <rect x="680" y="52" width="200" height="40" fill="#1a2236" rx="20" stroke="#1f2d45" stroke-width="1"/>
  <rect x="690" y="62" width="44" height="22" fill="#34d399" rx="11"/>
  <circle cx="722" cy="73" r="9" fill="white" filter="drop-shadow(0 1px 3px rgba(0,0,0,0.4))"/>
  <text x="742" y="77" fill="#e2e8f0" font-size="13" font-weight="500">Kids WiFi Active</text>

  <!-- Stat cards row -->
  <!-- Card 1 - Devices -->
  <rect x="20" y="108" width="206" height="70" fill="#111827" rx="10" stroke="#1f2d45" stroke-width="1"/>
  <rect x="20" y="108" width="206" height="2" fill="#34d399" rx="1"/>
  <text x="34" y="140" fill="#34d399" font-size="26" font-weight="600" class="mono">3</text>
  <text x="34" y="165" fill="#94a3b8" font-size="10" class="mono">DEVICES ONLINE</text>

  <!-- Card 2 - SSID -->
  <rect x="236" y="108" width="206" height="70" fill="#111827" rx="10" stroke="#1f2d45" stroke-width="1"/>
  <rect x="236" y="108" width="206" height="2" fill="#4f9cf9" rx="1"/>
  <text x="250" y="140" fill="#4f9cf9" font-size="16" font-weight="600" class="mono">HomeNet_Kids</text>
  <text x="250" y="165" fill="#94a3b8" font-size="10" class="mono">ACTIVE SSID</text>

  <!-- Card 3 - DNS -->
  <rect x="452" y="108" width="206" height="70" fill="#111827" rx="10" stroke="#1f2d45" stroke-width="1"/>
  <rect x="452" y="108" width="206" height="2" fill="#fb923c" rx="1"/>
  <text x="466" y="140" fill="#fb923c" font-size="16" font-weight="600" class="mono">1.1.1.3</text>
  <text x="466" y="165" fill="#94a3b8" font-size="10" class="mono">DNS RESOLVER</text>

  <!-- Card 4 - Schedule -->
  <rect x="668" y="108" width="212" height="70" fill="#111827" rx="10" stroke="#1f2d45" stroke-width="1"/>
  <rect x="668" y="108" width="212" height="2" fill="#a78bfa" rx="1"/>
  <text x="682" y="140" fill="#a78bfa" font-size="15" font-weight="600" class="mono">ON until 21:00</text>
  <text x="682" y="165" fill="#94a3b8" font-size="10" class="mono">SCHEDULE</text>

  <!-- WiFi Settings Panel -->
  <rect x="20" y="192" width="860" height="50" fill="#111827" rx="10" stroke="#1f2d45" stroke-width="1"/>
  <text x="38" y="222" font-size="16">📡</text>
  <text x="58" y="223" fill="#e2e8f0" font-size="14" font-weight="600">WiFi Settings</text>
  <text x="680" y="223" fill="#64748b" font-size="12">SSID, password, band</text>
  <text x="840" y="223" fill="#64748b" font-size="12">▼</text>
  <!-- WiFi panel body -->
  <rect x="20" y="241" width="860" height="90" fill="#111827" rx="0" stroke="#1f2d45" stroke-width="1"/>
  <rect x="20" y="330" width="860" height="1" fill="#1f2d45"/>
  <!-- SSID field -->
  <text x="36" y="262" fill="#64748b" font-size="10" class="mono">SSID — NETWORK NAME</text>
  <rect x="36" y="268" width="200" height="30" fill="#0a0e1a" rx="7" stroke="#2a3f5f" stroke-width="1"/>
  <text x="48" y="288" fill="#e2e8f0" font-size="12" class="mono">HomeNet_Kids</text>
  <!-- Password field -->
  <text x="260" y="262" fill="#64748b" font-size="10" class="mono">PASSWORD</text>
  <rect x="260" y="268" width="200" height="30" fill="#0a0e1a" rx="7" stroke="#2a3f5f" stroke-width="1"/>
  <text x="272" y="288" fill="#e2e8f0" font-size="12" class="mono">••••••••••••</text>
  <!-- Radio cards -->
  <rect x="36" y="306" width="90" height="18" fill="rgba(79,156,249,0.06)" rx="4" stroke="#4f9cf9" stroke-width="1.5"/>
  <text x="68" y="319" fill="#e2e8f0" font-size="10" font-weight="600" text-anchor="middle">2.4 GHz</text>
  <rect x="134" y="306" width="90" height="18" fill="#111827" rx="4" stroke="#1f2d45" stroke-width="1"/>
  <text x="179" y="319" fill="#94a3b8" font-size="10" text-anchor="middle">5 GHz</text>
  <rect x="232" y="306" width="90" height="18" fill="#111827" rx="4" stroke="#1f2d45" stroke-width="1"/>
  <text x="277" y="319" fill="#94a3b8" font-size="10" text-anchor="middle">6 GHz</text>
  <rect x="330" y="306" width="90" height="18" fill="#111827" rx="4" stroke="#1f2d45" stroke-width="1"/>
  <text x="375" y="319" fill="#94a3b8" font-size="10" text-anchor="middle">All Bands</text>

  <!-- DNS Panel -->
  <rect x="20" y="336" width="860" height="50" fill="#111827" rx="0" stroke="#1f2d45" stroke-width="1"/>
  <text x="38" y="366" font-size="16">🛡️</text>
  <text x="58" y="367" fill="#e2e8f0" font-size="14" font-weight="600">DNS &amp; Content Filtering</text>
  <text x="650" y="367" fill="#64748b" font-size="12">DHCP Option 6 — zero overhead</text>
  <text x="840" y="367" fill="#64748b" font-size="12">▼</text>
  <!-- DNS body -->
  <rect x="20" y="385" width="860" height="80" fill="#111827" rx="0" stroke="#1f2d45" stroke-width="1"/>
  <!-- DNS option cards -->
  <!-- Cloudflare Family - selected -->
  <rect x="36" y="396" width="132" height="58" fill="rgba(79,156,249,0.07)" rx="8" stroke="#4f9cf9" stroke-width="2"/>
  <rect x="42" y="401" width="52" height="12" fill="rgba(52,211,153,0.12)" rx="2" stroke="rgba(52,211,153,0.3)" stroke-width="0.5"/>
  <text x="68" y="411" fill="#34d399" font-size="8" class="mono" text-anchor="middle">Family Safe</text>
  <text x="44" y="424" fill="#e2e8f0" font-size="11" font-weight="600">Cloudflare Family</text>
  <text x="44" y="437" fill="#4f9cf9" font-size="9" class="mono">1.1.1.3 / 1.0.0.3</text>
  <text x="44" y="448" fill="#64748b" font-size="8">Malware + adult content</text>
  <!-- CleanBrowsing -->
  <rect x="176" y="396" width="132" height="58" fill="#111827" rx="8" stroke="#1f2d45" stroke-width="1"/>
  <rect x="182" y="401" width="32" height="12" fill="rgba(251,146,60,0.12)" rx="2" stroke="rgba(251,146,60,0.3)" stroke-width="0.5"/>
  <text x="198" y="411" fill="#fb923c" font-size="8" class="mono" text-anchor="middle">Strict</text>
  <text x="182" y="424" fill="#e2e8f0" font-size="11" font-weight="600">CleanBrowsing</text>
  <text x="182" y="437" fill="#4f9cf9" font-size="9" class="mono">185.228.168.9</text>
  <text x="182" y="448" fill="#64748b" font-size="8">Blocks proxies &amp; VPNs</text>
  <!-- OpenDNS -->
  <rect x="316" y="396" width="132" height="58" fill="#111827" rx="8" stroke="#1f2d45" stroke-width="1"/>
  <rect x="322" y="401" width="52" height="12" fill="rgba(52,211,153,0.12)" rx="2" stroke="rgba(52,211,153,0.3)" stroke-width="0.5"/>
  <text x="348" y="411" fill="#34d399" font-size="8" class="mono" text-anchor="middle">Family Safe</text>
  <text x="322" y="424" fill="#e2e8f0" font-size="11" font-weight="600">OpenDNS Family</text>
  <text x="322" y="437" fill="#4f9cf9" font-size="9" class="mono">208.67.222.123</text>
  <text x="322" y="448" fill="#64748b" font-size="8">Cisco-backed filtering</text>
  <!-- Quad9 -->
  <rect x="456" y="396" width="132" height="58" fill="#111827" rx="8" stroke="#1f2d45" stroke-width="1"/>
  <rect x="462" y="401" width="68" height="12" fill="rgba(79,156,249,0.12)" rx="2" stroke="rgba(79,156,249,0.3)" stroke-width="0.5"/>
  <text x="496" y="411" fill="#4f9cf9" font-size="8" class="mono" text-anchor="middle">Malware Only</text>
  <text x="462" y="424" fill="#e2e8f0" font-size="11" font-weight="600">Quad9 Secure</text>
  <text x="462" y="437" fill="#4f9cf9" font-size="9" class="mono">9.9.9.11</text>
  <text x="462" y="448" fill="#64748b" font-size="8">Non-profit, no logging</text>
  <!-- AdGuard -->
  <rect x="596" y="396" width="132" height="58" fill="#111827" rx="8" stroke="#1f2d45" stroke-width="1"/>
  <rect x="602" y="401" width="52" height="12" fill="rgba(52,211,153,0.12)" rx="2" stroke="rgba(52,211,153,0.3)" stroke-width="0.5"/>
  <text x="628" y="411" fill="#34d399" font-size="8" class="mono" text-anchor="middle">Family Safe</text>
  <text x="602" y="424" fill="#e2e8f0" font-size="11" font-weight="600">AdGuard Family</text>
  <text x="602" y="437" fill="#4f9cf9" font-size="9" class="mono">94.140.14.15</text>
  <text x="602" y="448" fill="#64748b" font-size="8">Ads + adult content</text>
  <!-- Custom -->
  <rect x="736" y="396" width="132" height="58" fill="#111827" rx="8" stroke="#1f2d45" stroke-width="1"/>
  <rect x="742" y="401" width="36" height="12" fill="rgba(167,139,250,0.12)" rx="2" stroke="rgba(167,139,250,0.3)" stroke-width="0.5"/>
  <text x="760" y="411" fill="#a78bfa" font-size="8" class="mono" text-anchor="middle">Custom</text>
  <text x="742" y="424" fill="#e2e8f0" font-size="11" font-weight="600">Custom DNS</text>
  <text x="742" y="437" fill="#4f9cf9" font-size="9" class="mono">—</text>
  <text x="742" y="448" fill="#64748b" font-size="8">Enter any resolver IP</text>

  <!-- Schedule Panel header -->
  <rect x="20" y="470" width="860" height="50" fill="#111827" rx="0" stroke="#1f2d45" stroke-width="1"/>
  <text x="38" y="500" font-size="16">🌙</text>
  <text x="58" y="501" fill="#e2e8f0" font-size="14" font-weight="600">Bedtime Schedule</text>
  <text x="680" y="501" fill="#64748b" font-size="12">Auto on/off by day &amp; hour</text>
  <text x="840" y="501" fill="#64748b" font-size="12">▼</text>

  <!-- Bottom button row -->
  <rect x="20" y="530" width="860" height="1" fill="#1f2d45"/>
  <rect x="20" y="543" width="148" height="28" fill="transparent" rx="7" stroke="#2a3f5f" stroke-width="1"/>
  <text x="94" y="562" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">⏱ Grant 1h Extension</text>
  <rect x="178" y="543" width="148" height="28" fill="#34d399" rx="7"/>
  <text x="252" y="562" fill="#000" font-size="12" font-weight="600" text-anchor="middle">💾 Save &amp; Apply All</text>
  <rect x="336" y="543" width="80" height="28" fill="transparent" rx="7" stroke="#2a3f5f" stroke-width="1"/>
  <text x="376" y="562" fill="#e2e8f0" font-size="12" text-anchor="middle">↩ Revert</text>
  <rect x="732" y="543" width="148" height="28" fill="transparent" rx="7" stroke="#f87171" stroke-width="1"/>
  <text x="806" y="562" fill="#f87171" font-size="12" text-anchor="middle">🗑 Remove Kids Network</text>
</svg>
